<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PPCHAT 配额监控</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
body { font-family:-apple-system,BlinkMacSystemFont,sans-serif; background:#0f172a; color:#e2e8f0; margin:0; padding:20px; }
.header { text-align:center; margin-bottom:20px; }
.header h1 { font-size:1.5em; margin:0; color:#60a5fa; }
.header .update { font-size:0.85em; color:#94a3b8; margin-top:4px; }
.stats { display:flex; justify-content:center; gap:20px; margin-bottom:20px; flex-wrap:wrap; }
.stat-card { background:#1e293b; border-radius:12px; padding:16px 24px; text-align:center; min-width:140px; }
.stat-card .label { font-size:0.8em; color:#94a3b8; }
.stat-card .value { font-size:1.6em; font-weight:bold; margin-top:4px; }
.stat-card .value.green { color:#4ade80; }
.stat-card .value.blue { color:#60a5fa; }
.stat-card .value.orange { color:#fb923c; }
.chart-container { background:#1e293b; border-radius:12px; padding:20px; max-width:900px; margin:0 auto; }
</style>
</head>
<body>
<div class="header">
  <h1>📊 PPCHAT 配额监控 - 剩余配额趋势</h1>
  <div class="update">最后更新: 2026-03-08T17:30:18 · 数据点: 9 · 保留近7天</div>
</div>
<div class="stats">
  <div class="stat-card"><div class="label">剩余配额</div><div class="value green">184,250</div></div>
  <div class="stat-card"><div class="label">今日已用</div><div class="value orange">17,570</div></div>
  <div class="stat-card"><div class="label">今日充入</div><div class="value blue">201,820</div></div>
</div>
<div class="chart-container">
  <canvas id="chart"></canvas>
</div>
<script>
const ctx = document.getElementById('chart').getContext('2d');
new Chart(ctx, {
  type: 'line',
  data: {
    datasets: [
      { label:"2026-03-08", data:[{"x": 400, "y": 199790}, {"x": 989, "y": 184250}, {"x": 991, "y": 184250}, {"x": 1000, "y": 184250}, {"x": 1011, "y": 184250}, {"x": 1020, "y": 184250}, {"x": 1030, "y": 184250}, {"x": 1040, "y": 184250}, {"x": 1050, "y": 184250}], borderColor:"#4ade80", backgroundColor:"transparent", tension:0.3, pointRadius:3, borderWidth:2 }
    ]
  },
  options: {
    responsive: true,
    plugins: {
      legend: { labels: { color:'#e2e8f0' } },
      tooltip: {
        mode:'nearest', intersect:false,
        callbacks: {
          title: function(items) {
            const m = items[0].parsed.x;
            const hh = String(Math.floor(m/60)).padStart(2,'0');
            const mm = String(m%60).padStart(2,'0');
            return items[0].dataset.label + ' ' + hh + ':' + mm;
          }
        }
      }
    },
    scales: {
      x: {
        type: 'linear',
        min: 0,
        max: 1440,
        ticks: {
          color:'#94a3b8',
          stepSize: 60,
          callback: function(v) {
            return String(Math.floor(v/60)).padStart(2,'0') + ':00';
          }
        },
        grid: { color:'#334155' },
        title: { display:true, text:'时间', color:'#94a3b8' }
      },
      y: {
        ticks: { color:'#94a3b8' },
        grid: { color:'#334155' },
        title: { display:true, text:'剩余配额', color:'#94a3b8' }
      }
    }
  }
});
</script>
</body>
</html>
